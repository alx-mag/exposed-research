spring.application.name=spring-exposed

spring.exposed.generate-ddl=false
spring.exposed.show-sql=true

server.port=8080

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.datasource.url=jdbc:postgresql://db-service:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.hikari.maximumPoolSize=${POOL_SIZE}
spring.datasource.hikari.minimum-idle=${POOL_SIZE}
spring.datasource.hikari.poolName=jdbc-pool
spring.datasource.hikari.idleTimeout=1800000

spring.docker.compose.enabled=false